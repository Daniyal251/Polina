<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета гостя</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <h1>Анкета гостя</h1>
        <nav>
            <a href="index.html">Главная</a>
        </nav>
    </header>
    <main class="section">
        <form action="mailto:example@example.com" method="post" enctype="text/plain">
            <label>Имя и фамилия:<br><input type="text" name="name" required></label><br><br>
            <label>Будете ли присутствовать?<br>
                <select name="attendance">
                    <option>Да</option>
                    <option>Нет</option>
                </select>
            </label><br><br>
            <label>Аллергии / предпочтения:<br><textarea name="diet" rows="3"></textarea></label><br><br>
            <label>Ваш телефон или e-mail:<br><input type="text" name="contact"></label><br><br>
            <input type="submit" value="Отправить" class="button">
        </form>
        <p>Если форма не отправляется, пожалуйста, пришлите информацию напрямую на&nbsp;<a href="mailto:example@example.com">example@example.com</a>.</p>
    </main>
    <footer class="site-footer">
        <p>&copy; 2026 Фёдор &amp; Полин.</p>
    </footer>
</body>
</html>
